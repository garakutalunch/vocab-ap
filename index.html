<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANKI Ver. 1.2 - Bilingual Vocab Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .hidden { display: none; }
        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1); width: 36px; height: 36px;
            border-radius: 50%; border-left-color: #3b82f6; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-srs { transition: all 0.2s ease; }
        .btn-srs:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans p-2">

    <div id="app" class="max-w-xl mx-auto py-4">
        
        <header class="text-center mb-6">
            <h1 class="text-2xl font-black text-blue-600 tracking-tighter">ANKI Ver. 1.2</h1>
            <p class="text-xs text-slate-400 font-bold uppercase">Space Repetition Learning Tool</p>
        </header>

        <div id="screen-setup" class="space-y-4">
            
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-sm font-bold mb-3 flex justify-between">
                    <span>学習ユニットの選択 / Select Unit</span>
                    <button id="delete-unit-btn" class="text-red-400 hover:text-red-600 text-xs">[ 削除 / Delete ]</button>
                </h2>
                <select id="unit-selector" class="w-full p-3 border rounded-lg bg-slate-50 mb-4 focus:ring-2 focus:ring-blue-500 outline-none"></select>

                <h2 class="text-sm font-bold mb-2">新規登録・追加 / Register & Add</h2>
                <input type="text" id="unit-name-input" placeholder="ユニット名 (例: Unit 1) / Unit Name" class="w-full p-3 border rounded-lg mb-3 outline-none focus:ring-2 focus:ring-blue-500">
                
                <div class="flex gap-2 mb-3">
                    <label class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 text-center py-2 rounded-lg cursor-pointer text-sm font-bold border border-dashed border-slate-300">
                        📁 ファイル選択 / Open File
                        <input type="file" id="file-input" accept=".txt" class="hidden">
                    </label>
                </div>

                <textarea id="word-input" rows="5" class="w-full p-3 border rounded-lg bg-slate-50 font-mono text-xs mb-3" placeholder="word: sentence / translation&#10;apple: I eat an apple. / りんご"></textarea>
                
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400">音声 / Voice</label>
                        <select id="voice-select" class="w-full p-2 border rounded text-sm bg-white">
                            <option value="Kore">Kore (US Female)</option>
                            <option value="Puck">Puck (US Male)</option>
                            <option value="Gacrux">Gacrux (UK Female)</option>
                            <option value="Algieba">Algieba (UK Male)</option>
                        </select>
                    </div>
                    <button id="start-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg transition-all">
                        開始 / Start
                    </button>
                </div>
            </div>

            <div class="flex justify-between gap-4 px-2">
                <button id="export-btn" class="text-xs text-slate-500 hover:text-blue-600">📤 バックアップ / Export Backup</button>
                <label class="text-xs text-slate-500 hover:text-blue-600 cursor-pointer">
                    📥 復元 / Restore Import
                    <input type="file" id="restore-input" accept=".json" class="hidden">
                </label>
            </div>
        </div>

        <div id="screen-practice" class="hidden space-y-4">
            <div class="flex items-center justify-between px-2">
                <button id="back-to-setup" class="text-slate-400 hover:text-slate-800 text-sm">← 戻る / Back</button>
                <div id="progress-indicator" class="text-[10px] font-black bg-slate-200 px-3 py-1 rounded-full">0/0</div>
            </div>

            <div class="bg-white p-8 rounded-3xl card-shadow min-h-[250px] flex flex-col items-center justify-center text-center relative border border-slate-100">
                <div id="display-text" class="text-2xl font-bold leading-relaxed mb-6 break-words w-full"></div>
                <div id="display-translation" class="text-slate-400 text-sm font-medium mb-6"></div>
                
                <button id="listen-btn" class="bg-blue-50 text-blue-600 p-4 rounded-full transition-colors hover:bg-blue-100 mb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                </button>
            </div>

            <div class="grid grid-cols-3 gap-1 p-1 bg-slate-200 rounded-xl text-[10px] font-bold">
                <button data-mode="all-hidden" class="mode-toggle py-2 rounded-lg bg-white shadow-sm">全部非表示<br>All Hidden</button>
                <button data-mode="cloze" class="mode-toggle py-2 rounded-lg text-slate-500">虫食い<br>Cloze</button>
                <button data-mode="hint" class="mode-toggle py-2 rounded-lg text-slate-500">頭文字ヒント<br>Hint</button>
            </div>

            <div id="answer-controls" class="space-y-4">
                <button id="show-answer-btn" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-bold shadow-lg">答えを表示 / Show Answer</button>
                
                <div id="srs-buttons" class="hidden grid grid-cols-4 gap-2">
                    <button data-interval="60" class="btn-srs bg-rose-100 text-rose-600 p-3 rounded-xl flex flex-col items-center">
                        <span class="text-[10px] font-bold">Again</span>
                        <span class="text-[9px]">1m</span>
                    </button>
                    <button data-interval="600" class="btn-srs bg-orange-100 text-orange-600 p-3 rounded-xl flex flex-col items-center">
                        <span class="text-[10px] font-bold">Hard</span>
                        <span class="text-[9px]">10m</span>
                    </button>
                    <button data-interval="86400" class="btn-srs bg-green-100 text-green-600 p-3 rounded-xl flex flex-col items-center">
                        <span class="text-[10px] font-bold">Good</span>
                        <span class="text-[9px]">1d</span>
                    </button>
                    <button data-interval="345600" class="btn-srs bg-sky-100 text-sky-600 p-3 rounded-xl flex flex-col items-center">
                        <span class="text-[10px] font-bold">Easy</span>
                        <span class="text-[9px]">4d</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="loading-overlay" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50">
            <div class="bg-white p-8 rounded-3xl flex flex-col items-center space-y-4 shadow-2xl">
                <div class="loading-spinner"></div>
                <p id="loading-status" class="font-bold text-sm">生成中 / Generating...</p>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; // API Key
        
        // Data Structure
        let db = {
            units: {}, // { "Unit Name": [ {target, sentence, translation, nextReview, ...} ] }
            lastUnit: ""
        };

        let currentUnitName = "";
        let sessionQueue = [];
        let currentIndex = 0;
        let currentMode = 'all-hidden';
        let audioCache = {};

        // Initialization
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('anki_v12_db');
            if (saved) {
                db = JSON.parse(saved);
                updateUnitSelector();
                if (db.lastUnit && db.units[db.lastUnit]) {
                    document.getElementById('unit-selector').value = db.lastUnit;
                }
            }
        });

        // UI Helpers
        function saveData() {
            localStorage.setItem('anki_v12_db', JSON.stringify(db));
        }

        function updateUnitSelector() {
            const selector = document.getElementById('unit-selector');
            selector.innerHTML = '';
            Object.keys(db.units).forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                selector.appendChild(opt);
            });
        }

        // PCM to WAV (Keep existing logic)
        function pcmToWav(base64Data, sampleRate = 24000) {
            const byteCharacters = atob(base64Data);
            const pcmData = new Uint8Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) pcmData[i] = byteCharacters.charCodeAt(i);
            const buffer = new ArrayBuffer(44 + pcmData.length);
            const view = new DataView(buffer);
            const writeString = (offset, string) => { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); };
            writeString(0, 'RIFF'); view.setUint32(4, 36 + pcmData.length, true); writeString(8, 'WAVE');
            writeString(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true);
            view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeString(36, 'data');
            view.setUint32(40, pcmData.length, true);
            new Uint8Array(buffer).set(pcmData, 44);
            return new Blob([buffer], { type: 'audio/wav' });
        }

        async function fetchTTS(text, voice) {
            const isUK = (voice === 'Gacrux' || voice === 'Algieba');
            const prompt = isUK ? `Say clearly: ${text}. Please speak in a formal, sophisticated British Received Pronunciation (Oxbridge) accent with clear enunciation.` : `Say: ${text}`;
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } } } },
                    model: "gemini-2.5-flash-preview-tts"
                })
            });
            const json = await res.json();
            return pcmToWav(json.candidates[0].content.parts[0].inlineData.data);
        }

        // Logic Implementation
        document.getElementById('start-btn').addEventListener('click', async () => {
            const inputName = document.getElementById('unit-name-input').value.trim();
            const selectedName = document.getElementById('unit-selector').value;
            const text = document.getElementById('word-input').value.trim();
            
            // Determine active unit
            currentUnitName = inputName || selectedName || db.lastUnit;
            if (!currentUnitName) return alert("ユニット名を入力または選択してください。 / Please select a unit.");

            // Parse and merge data
            if (text) {
                const lines = text.split('\n').filter(l => l.trim());
                const items = lines.map(line => {
                    const [main, translation] = line.split('/');
                    const [target, sentence] = main.split(/[:\t,]/);
                    return {
                        target: target?.trim() || "",
                        sentence: sentence?.trim() || "",
                        translation: translation?.trim() || "",
                        nextReview: Date.now()
                    };
                }).filter(i => i.target && i.sentence);

                if (!db.units[currentUnitName]) db.units[currentUnitName] = [];
                db.units[currentUnitName] = [...db.units[currentUnitName], ...items];
            }

            if (!db.units[currentUnitName] || db.units[currentUnitName].length === 0) return alert("データがありません。");

            db.lastUnit = currentUnitName;
            saveData();

            // Prepare session (SRS: only items due)
            const now = Date.now();
            sessionQueue = db.units[currentUnitName]
                .filter(item => item.nextReview <= now)
                .sort(() => Math.random() - 0.5);

            if (sessionQueue.length === 0) {
                if(!confirm("復習対象の単語がありません。全単語を学習しますか？ / No cards due. Study all?")) return;
                sessionQueue = [...db.units[currentUnitName]].sort(() => Math.random() - 0.5);
            }

            // Audio generation
            document.getElementById('loading-overlay').classList.remove('hidden');
            audioCache = {};
            const voice = document.getElementById('voice-select').value;
            for (let i = 0; i < sessionQueue.length; i++) {
                document.getElementById('loading-status').textContent = `Audio: ${i+1}/${sessionQueue.length}`;
                try {
                    const blob = await fetchTTS(sessionQueue[i].sentence, voice);
                    audioCache[i] = URL.createObjectURL(blob);
                } catch(e) { console.error(e); }
            }

            document.getElementById('loading-overlay').classList.add('hidden');
            document.getElementById('screen-setup').classList.add('hidden');
            document.getElementById('screen-practice').classList.remove('hidden');
            currentIndex = 0;
            renderCard();
        });

        function renderCard(showAnswer = false) {
            const item = sessionQueue[currentIndex];
            const display = document.getElementById('display-text');
            const trans = document.getElementById('display-translation');
            
            trans.innerText = (currentMode === 'hint' || showAnswer) ? item.translation : "";
            
            if (showAnswer) {
                display.innerText = item.sentence;
            } else {
                if (currentMode === 'all-hidden') {
                    display.innerText = item.sentence.replace(/[a-zA-Z0-9]/g, '_');
                } else if (currentMode === 'cloze') {
                    const regex = new RegExp(item.target.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
                    display.innerText = item.sentence.replace(regex, (m) => `[ ${'_'.repeat(m.length)} ]`);
                } else if (currentMode === 'hint') {
                    const regex = new RegExp(item.target.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
                    display.innerText = item.sentence.replace(regex, (m) => `${m[0]}${'_'.repeat(m.length-1)}`);
                }
            }

            document.getElementById('progress-indicator').textContent = `${currentIndex + 1} / ${sessionQueue.length}`;
            document.getElementById('show-answer-btn').classList.toggle('hidden', showAnswer);
            document.getElementById('srs-buttons').classList.toggle('hidden', !showAnswer);
        }

        // Event Listeners for SRS
        document.getElementById('show-answer-btn').addEventListener('click', () => renderCard(true));

        document.querySelectorAll('.btn-srs').forEach(btn => {
            btn.addEventListener('click', () => {
                const interval = parseInt(btn.dataset.interval);
                const item = sessionQueue[currentIndex];
                
                // Update the real DB reference
                const dbItem = db.units[currentUnitName].find(i => i.sentence === item.sentence && i.target === item.target);
                if (dbItem) {
                    dbItem.nextReview = Date.now() + (interval * 1000);
                    saveData();
                }

                currentIndex++;
                if (currentIndex >= sessionQueue.length) {
                    alert("セッション終了！ / Session Finished!");
                    location.reload();
                } else {
                    renderCard();
                }
            });
        });

        // Mode Toggles
        document.querySelectorAll('.mode-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                currentMode = btn.dataset.mode;
                document.querySelectorAll('.mode-toggle').forEach(b => {
                    b.classList.remove('bg-white', 'shadow-sm'); b.classList.add('text-slate-500');
                });
                btn.classList.add('bg-white', 'shadow-sm'); btn.classList.remove('text-slate-500');
                renderCard();
            });
        });

        // Listen
        document.getElementById('listen-btn').addEventListener('click', () => {
            if (audioCache[currentIndex]) new Audio(audioCache[currentIndex]).play();
        });

        // File Input Handling
        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('word-input').value = e.target.result;
                const name = file.name.replace('.txt', '');
                document.getElementById('unit-name-input').value = name;
            };
            reader.readAsText(file);
        });

        // Backup & Restore
        document.getElementById('export-btn').addEventListener('click', () => {
            const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `anki_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        });

        document.getElementById('restore-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    db = JSON.parse(e.target.result);
                    saveData();
                    updateUnitSelector();
                    alert("復元完了 / Restore Success");
                } catch(err) { alert("無効なファイルです / Invalid File"); }
            };
            reader.readAsText(file);
        });

        document.getElementById('delete-unit-btn').addEventListener('click', () => {
            const name = document.getElementById('unit-selector').value;
            if (name && confirm(`「${name}」を削除しますか？ / Delete this unit?`)) {
                delete db.units[name];
                saveData();
                updateUnitSelector();
            }
        });

        document.getElementById('back-to-setup').addEventListener('click', () => location.reload());

    </script>
</body>
</html>
