<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANKI Ver. 1.2.4 - Bilingual Vocab Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .hidden { display: none; }
        .btn-srs { transition: all 0.2s ease; }
        .btn-srs:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans p-2">

    <div id="app" class="max-w-xl mx-auto py-4">
        
        <!-- Header -->
        <header class="text-center mb-6">
            <h1 class="text-2xl font-black text-blue-600 tracking-tighter">ANKI Ver. 1.2.4</h1>
            <p class="text-xs text-slate-400 font-bold uppercase">Space Repetition Learning Tool</p>
        </header>

        <!-- Screen 1: Setup / 設定画面 -->
        <div id="screen-setup" class="space-y-4">
            
            <!-- Unit Management / ユニット管理 -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-sm font-bold mb-3 flex justify-between">
                    <span>学習ユニットの選択 / Select Unit</span>
                    <button id="delete-unit-btn" class="text-red-400 hover:text-red-600 text-xs">[ 削除 / Delete ]</button>
                </h2>
                <select id="unit-selector" class="w-full p-3 border rounded-lg bg-slate-50 mb-4 focus:ring-2 focus:ring-blue-500 outline-none"></select>

                <h2 class="text-sm font-bold mb-2">新規登録・追加 / Register & Add</h2>
                <input type="text" id="unit-name-input" placeholder="新しいユニット名を入力 / New Unit Name" class="w-full p-3 border rounded-lg mb-3 outline-none focus:ring-2 focus:ring-blue-500">
                
                <div class="flex gap-2 mb-3">
                    <label class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 text-center py-2 rounded-lg cursor-pointer text-sm font-bold border border-dashed border-slate-300">
                        📁 ファイル選択 / Open File (.txt)
                        <input type="file" id="file-input" accept=".txt" class="hidden">
                    </label>
                </div>

                <textarea id="word-input" rows="5" class="w-full p-3 border rounded-lg bg-slate-50 font-mono text-xs mb-3" placeholder="word: sentence / translation&#10;apple: I eat an apple. / りんご"></textarea>
                
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400">音声 / Voice</label>
                        <select id="voice-select" class="w-full p-2 border rounded text-sm bg-white">
                            <option value="Kore">Kore (US Female)</option>
                            <option value="Puck">Puck (US Male)</option>
                            <option value="Gacrux">Gacrux (UK Female)</option>
                            <option value="Algieba">Algieba (UK Male)</option>
                            <option value="Aoede">Aoede (JP Female)</option>
                            <option value="Charon">Charon (JP Male)</option>
                        </select>
                    </div>
                    <button id="start-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg transition-all">
                        開始 / Start
                    </button>
                </div>
            </div>

            <!-- Backup Tools -->
            <div class="flex justify-between gap-4 px-2">
                <button id="export-btn" class="text-xs text-slate-500 hover:text-blue-600">📤 バックアップ / Export Backup</button>
                <label class="text-xs text-slate-500 hover:text-blue-600 cursor-pointer">
                    📥 復元 / Restore Import
                    <input type="file" id="restore-input" accept=".json" class="hidden">
                </label>
            </div>
        </div>

        <!-- Screen 2: Practice / 練習画面 -->
        <div id="screen-practice" class="hidden space-y-4">
            <div class="flex items-center justify-between px-2">
                <div class="flex gap-3">
                    <button id="back-to-setup" class="text-slate-400 hover:text-slate-800 text-sm font-bold">← 終了 / Exit</button>
                    <button id="prev-card-btn" class="text-blue-500 hover:text-blue-700 text-sm font-bold hidden">◀ 前へ / Prev</button>
                </div>
                <div id="progress-indicator" class="text-[10px] font-black bg-slate-200 px-3 py-1 rounded-full">0/0</div>
            </div>

            <!-- Display Card -->
            <div class="bg-white p-8 rounded-3xl card-shadow min-h-[250px] flex flex-col items-center justify-center text-center relative border border-slate-100">
                <div id="display-text" class="text-2xl font-bold leading-relaxed mb-6 break-words w-full"></div>
                <div id="display-translation" class="text-slate-400 text-sm font-medium mb-6 min-h-[1.5rem]"></div>
                
                <button id="listen-btn" class="bg-blue-50 text-blue-600 p-4 rounded-full transition-colors hover:bg-blue-100 mb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                </button>
            </div>

            <!-- Mode Selector -->
            <div class="grid grid-cols-3 gap-1 p-1 bg-slate-200 rounded-xl text-[10px] font-bold">
                <button data-mode="all-hidden" class="mode-toggle py-2 rounded-lg text-slate-500">全部非表示<br>All Hidden</button>
                <button data-mode="cloze" class="mode-toggle py-2 rounded-lg bg-white shadow-sm">虫食い<br>Cloze</button>
                <button data-mode="hint" class="mode-toggle py-2 rounded-lg text-slate-500">頭文字ヒント<br>Hint</button>
            </div>

            <!-- SRS Buttons (Show after "Show Answer") -->
            <div id="answer-controls" class="space-y-4">
                <button id="show-answer-btn" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-bold shadow-lg">答えを表示 / Show Answer</button>
                
                <div id="srs-buttons" class="hidden grid grid-cols-4 gap-2">
                    <button data-interval="60" class="btn-srs bg-rose-100 text-rose-600 p-3 rounded-xl flex flex-col items-center">
                        <span class="text-[10px] font-bold">Again</span>
                        <span class="text-[9px]">1m</span>
                    </button>
                    <button data-interval="600" class="btn-srs bg-orange-100 text-orange-600 p-3 rounded-xl flex flex-col items-center">
                        <span class="text-[10px] font-bold">Hard</span>
                        <span class="text-[9px]">10m</span>
                    </button>
                    <button data-interval="86400" class="btn-srs bg-green-100 text-green-600 p-3 rounded-xl flex flex-col items-center">
                        <span class="text-[10px] font-bold">Good</span>
                        <span class="text-[9px]">1d</span>
                    </button>
                    <button data-interval="345600" class="btn-srs bg-sky-100 text-sky-600 p-3 rounded-xl flex flex-col items-center">
                        <span class="text-[10px] font-bold">Easy</span>
                        <span class="text-[9px]">4d</span>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Data Structure
        let db = {
            units: {}, 
            lastUnit: ""
        };

        let currentUnitName = "";
        let sessionQueue = [];
        let currentIndex = 0;
        let currentMode = 'cloze'; // Default mode

        // Voices preload
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };

        // Initialization
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('anki_v12_db');
            if (saved) {
                try {
                    db = JSON.parse(saved);
                    updateUnitSelector();
                    if (db.lastUnit && db.units[db.lastUnit]) {
                        document.getElementById('unit-selector').value = db.lastUnit;
                    }
                } catch(e) {
                    console.error("Failed to parse saved data");
                }
            }
        });

        // UI Helpers
        function saveData() {
            localStorage.setItem('anki_v12_db', JSON.stringify(db));
        }

        function updateUnitSelector() {
            const selector = document.getElementById('unit-selector');
            selector.innerHTML = '';
            
            // Add an empty option to allow deselecting
            const emptyOpt = document.createElement('option');
            emptyOpt.value = "";
            emptyOpt.textContent = "--- 選択してください ---";
            selector.appendChild(emptyOpt);

            Object.keys(db.units).forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                selector.appendChild(opt);
            });
        }

        // Unit Selection Sync Logic
        document.getElementById('unit-selector').addEventListener('change', (e) => {
            // 既存のユニットが選ばれたら、新規入力欄を空にする（混乱を防ぐため）
            if (e.target.value !== "") {
                document.getElementById('unit-name-input').value = "";
                db.lastUnit = e.target.value;
                saveData();
            }
        });

        document.getElementById('unit-name-input').addEventListener('input', (e) => {
            // 新規入力欄に入力があったら、プルダウンの選択を解除する
            if (e.target.value.trim() !== "") {
                document.getElementById('unit-selector').value = "";
            }
        });

        // Web Speech API Logic (Offline TTS)
        function playOfflineTTS(text, voiceSetting) {
            if (!('speechSynthesis' in window)) {
                alert("お使いのブラウザは音声読み上げに対応していません。");
                return;
            }

            window.speechSynthesis.cancel(); // Stop any ongoing speech
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            
            let lang = 'en-US';
            if (voiceSetting === 'Gacrux' || voiceSetting === 'Algieba') {
                lang = 'en-GB';
            } else if (voiceSetting === 'Aoede' || voiceSetting === 'Charon') {
                lang = 'ja-JP';
            }
            utterance.lang = lang;

            let selectedVoice = null;
            if (lang === 'en-GB') {
                // Prioritize Daniel, UK, or GB voices for British accent
                selectedVoice = voices.find(v => v.lang.includes('en-GB') && (v.name.includes('Daniel') || v.name.includes('UK') || v.name.includes('GB') || v.name.includes('British') || v.name.includes('English (United Kingdom)')));
                if (!selectedVoice) selectedVoice = voices.find(v => v.lang.includes('en-GB'));
            } else if (lang === 'ja-JP') {
                selectedVoice = voices.find(v => v.lang.includes('ja-JP') || v.name.includes('Kyoko') || v.name.includes('Otoya') || v.name.includes('Hattori') || v.name.includes('日本語'));
            } else {
                // Default to US English
                selectedVoice = voices.find(v => v.lang.includes('en-US') && (v.name.includes('Samantha') || v.name.includes('Alex') || v.name.includes('US') || v.name.includes('English (United States)')));
                if (!selectedVoice) selectedVoice = voices.find(v => v.lang.includes('en-US'));
            }

            if (selectedVoice) {
                utterance.voice = selectedVoice;
            }

            window.speechSynthesis.speak(utterance);
        }

        // Logic Implementation
        document.getElementById('start-btn').addEventListener('click', async () => {
            const inputName = document.getElementById('unit-name-input').value.trim();
            const selectedName = document.getElementById('unit-selector').value;
            const text = document.getElementById('word-input').value.trim();
            
            // Determine active unit
            currentUnitName = inputName || selectedName;
            
            if (!currentUnitName) {
                return alert("ユニット名を入力または選択してください。 / Please enter or select a unit name.");
            }

            // Parse and merge data
            if (text) {
                const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
                const items = lines.map(line => {
                    const match = line.match(/[:\t：]/);
                    let leftPart = "";
                    let rightPart = "";
                    
                    if (match) {
                        leftPart = line.substring(0, match.index).trim();
                        rightPart = line.substring(match.index + 1).trim();
                    } else {
                        leftPart = line;
                        rightPart = line;
                    }
                    
                    let sentence = rightPart;
                    let translation = "";
                    const transMatch = rightPart.match(/[|｜\/／]/);
                    if (transMatch) {
                        sentence = rightPart.substring(0, transMatch.index).trim();
                        translation = rightPart.substring(transMatch.index + 1).trim();
                    }

                    let targetWord = leftPart.split(/[\s/（(]/)[0].trim();
                    if (!targetWord) targetWord = leftPart;

                    return {
                        targetRaw: leftPart,
                        targetWord: targetWord,
                        sentence: sentence,
                        translation: translation,
                        nextReview: Date.now()
                    };
                }).filter(i => i.sentence.length > 0); 

                if (items.length > 0) {
                    if (!db.units[currentUnitName]) db.units[currentUnitName] = [];
                    
                    const existingSentences = new Set(db.units[currentUnitName].map(i => i.sentence));
                    const newItems = items.filter(i => !existingSentences.has(i.sentence));
                    
                    if (newItems.length === 0 && document.getElementById('word-input').value.trim() !== "") {
                        alert("入力されたテキストは既にこのユニットに存在するため、追加されませんでした。");
                    } else if (newItems.length > 0) {
                        db.units[currentUnitName] = [...db.units[currentUnitName], ...newItems];
                        document.getElementById('word-input').value = "";
                        document.getElementById('unit-name-input').value = "";
                        updateUnitSelector();
                        document.getElementById('unit-selector').value = currentUnitName;
                    }
                }
            }

            // Check Data
            if (!db.units[currentUnitName] || db.units[currentUnitName].length === 0) {
                return alert(`ユニット「${currentUnitName}」にデータがありません。\nNo valid data found in this unit.`);
            }

            db.lastUnit = currentUnitName;
            saveData();

            // Prepare session
            const now = Date.now();
            sessionQueue = db.units[currentUnitName]
                .filter(item => item.nextReview <= now)
                .sort(() => Math.random() - 0.5);

            if (sessionQueue.length === 0) {
                if(!confirm("現在復習が必要な単語はありません。すべての単語を強制的に学習しますか？ / No cards due. Study all?")) return;
                sessionQueue = [...db.units[currentUnitName]].sort(() => Math.random() - 0.5);
            }

            // Immediately switch screens (No Loading Overlay, No API Calls)
            document.getElementById('screen-setup').classList.add('hidden');
            document.getElementById('screen-practice').classList.remove('hidden');
            currentIndex = 0;
            renderCard();
        });

        function renderCard(showAnswer = false) {
            if(currentIndex >= sessionQueue.length) return;
            const item = sessionQueue[currentIndex];
            const display = document.getElementById('display-text');
            const trans = document.getElementById('display-translation');
            
            trans.innerText = item.translation || "";
            document.getElementById('prev-card-btn').classList.toggle('hidden', currentIndex === 0);

            if (showAnswer) {
                display.innerHTML = `<div class="text-lg text-blue-600 mb-2">${item.targetRaw}</div><div>${item.sentence}</div>`;
            } else {
                const target = item.targetWord;
                const escapedTarget = target.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regexNoBound = new RegExp(escapedTarget, 'gi');

                if (currentMode === 'all-hidden') {
                    display.innerText = `[ ${'_'.repeat(target.length)} ]`;
                } else if (currentMode === 'cloze') {
                    if(target === item.sentence) {
                        display.innerText = `[ ${'_'.repeat(target.length)} ]`;
                    } else {
                        display.innerText = item.sentence.replace(regexNoBound, (m) => `[ ${'_'.repeat(m.length)} ]`);
                    }
                } else if (currentMode === 'hint') {
                    if(target === item.sentence) {
                        display.innerText = `[ ${target[0]}${'_'.repeat(target.length - 1)} ]`;
                    } else {
                        display.innerText = item.sentence.replace(regexNoBound, (m) => `[ ${m[0]}${'_'.repeat(m.length-1)} ]`);
                    }
                }
            }

            document.getElementById('progress-indicator').textContent = `${currentIndex + 1} / ${sessionQueue.length}`;
            document.getElementById('show-answer-btn').classList.toggle('hidden', showAnswer);
            document.getElementById('srs-buttons').classList.toggle('hidden', !showAnswer);
        }

        // Event Listeners for SRS
        document.getElementById('show-answer-btn').addEventListener('click', () => renderCard(true));

        document.querySelectorAll('.btn-srs').forEach(btn => {
            btn.addEventListener('click', () => {
                const interval = parseInt(btn.dataset.interval);
                const item = sessionQueue[currentIndex];
                
                const dbItem = db.units[currentUnitName].find(i => i.sentence === item.sentence && i.targetRaw === item.targetRaw);
                if (dbItem) {
                    dbItem.nextReview = Date.now() + (interval * 1000);
                    saveData();
                }

                currentIndex++;
                if (currentIndex >= sessionQueue.length) {
                    alert("セッション完了！お疲れ様でした。 / Session Finished!");
                    location.reload();
                } else {
                    renderCard();
                }
            });
        });

        document.getElementById('prev-card-btn').addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderCard();
            }
        });

        // Mode Toggles
        document.querySelectorAll('.mode-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                currentMode = btn.dataset.mode;
                document.querySelectorAll('.mode-toggle').forEach(b => {
                    b.classList.remove('bg-white', 'shadow-sm'); b.classList.add('text-slate-500');
                });
                btn.classList.add('bg-white', 'shadow-sm'); btn.classList.remove('text-slate-500');
                renderCard();
            });
        });

        // Listen Button (Offline Web Speech API)
        document.getElementById('listen-btn').addEventListener('click', () => {
            if (currentIndex < sessionQueue.length) {
                const item = sessionQueue[currentIndex];
                const voiceSetting = document.getElementById('voice-select').value;
                playOfflineTTS(item.sentence, voiceSetting);
            }
        });

        // File Input
        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('word-input').value = e.target.result;
                const name = file.name.replace('.txt', '');
                document.getElementById('unit-name-input').value = name;
                document.getElementById('unit-selector').value = ""; // Deselect dropdown
            };
            reader.readAsText(file);
        });

        // Backup & Restore
        document.getElementById('export-btn').addEventListener('click', () => {
            if(Object.keys(db.units).length === 0) return alert("エクスポートするデータがありません / No data to export");
            const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `anki_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        });

        document.getElementById('restore-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const importedDB = JSON.parse(e.target.result);
                    if(importedDB && importedDB.units) {
                        db = importedDB;
                        saveData();
                        updateUnitSelector();
                        alert("復元完了 / Restore Success");
                        location.reload();
                    } else {
                        throw new Error("Invalid structure");
                    }
                } catch(err) { alert("無効なファイル形式です / Invalid File Format"); }
            };
            reader.readAsText(file);
        });

        // Exact Delete Logic
        document.getElementById('delete-unit-btn').addEventListener('click', () => {
            const inputName = document.getElementById('unit-name-input').value.trim();
            const selectedName = document.getElementById('unit-selector').value;
            const nameToDelete = inputName || selectedName;

            if (nameToDelete && confirm(`「${nameToDelete}」を削除しますか？ / Delete this unit?`)) {
                delete db.units[nameToDelete];
                saveData();
                
                document.getElementById('unit-name-input').value = "";
                updateUnitSelector();
                
                if(Object.keys(db.units).length === 0) {
                    db.lastUnit = "";
                }
            } else if (!nameToDelete) {
                alert("削除するユニットが選択されていません。プルダウンから選択してください。");
            }
        });

        document.getElementById('back-to-setup').addEventListener('click', () => location.reload());

    </script>
</body>
</html>
